<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StatusMon Widget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Bricolage+Grotesque:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#07080d;--s1:#0d0e18;--border:#1a1c2e;--text:#dde0f5;--muted:#4a4d6e;--faint:#1a1c2a;--up:#2affa0;--up2:rgba(42,255,160,.1);--down:#ff3d6b;--down2:rgba(255,61,107,.1);--warn:#ffb830;--mono:'IBM Plex Mono',monospace;--sans:'Bricolage Grotesque',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;padding:12px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.header-left{display:flex;align-items:center;gap:7px}
.logo-mini{width:20px;height:20px;background:linear-gradient(135deg,#6c63ff,#2affa0);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.title{font-family:var(--sans);font-size:12px;font-weight:700;color:var(--text)}
.overall-dot{width:7px;height:7px;border-radius:50%}
.overall-dot.ok{background:var(--up);box-shadow:0 0 5px var(--up)}
.overall-dot.down{background:var(--down);box-shadow:0 0 5px var(--down);animation:pulse 1.5s infinite}
.overall-dot.maint{background:var(--warn)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.overall-text{font-size:10px;font-weight:600}
.overall-text.ok{color:var(--up)}.overall-text.down{color:var(--down)}.overall-text.maint{color:var(--warn)}

.service{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--faint)}
.service:last-child{border-bottom:none}
.service-left{display:flex;align-items:center;gap:8px}
.s-dot{width:6px;height:6px;border-radius:50%}
.s-dot.up{background:var(--up)}.s-dot.down{background:var(--down);animation:pulse 1.5s infinite}.s-dot.unknown{background:var(--muted)}
.s-name{font-family:var(--sans);font-size:12px;font-weight:600;color:var(--text)}
.s-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.s-status{font-size:10px;font-weight:600}
.s-status.up{color:var(--up)}.s-status.down{color:var(--down)}
.s-uptime{font-size:10px;color:var(--muted)}

.footer{margin-top:8px;padding-top:6px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.footer a{font-size:9px;color:var(--muted);text-decoration:none}
.footer a:hover{color:var(--text)}
.last-update{font-size:9px;color:var(--muted)}
.checks-row{display:flex;gap:1.5px;margin-top:4px;flex-wrap:wrap}
.chk{width:7px;height:7px;border-radius:1px;flex-shrink:0}
.chk.up{background:var(--up);opacity:.5}.chk.down{background:var(--down);opacity:.9}
</style>
<link rel="apple-touch-icon" href="/icon-180.png">
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo-mini">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <circle cx="6" cy="5.5" r="3" stroke="white" stroke-width="1"/>
        <path d="M3.5 5.5Q4.5 3.5 6 5.5Q7.5 7.5 8.5 5.5" stroke="rgba(255,255,255,.7)" stroke-width=".8" stroke-linecap="round" fill="none"/>
        <circle cx="6" cy="5.5" r=".9" fill="white"/>
      </svg>
    </div>
    <div class="title" id="widgetTitle">Estado</div>
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <div class="overall-dot" id="w-dot"></div>
    <div class="overall-text" id="w-overall">–</div>
  </div>
</div>

<div id="w-services"></div>

<div class="footer">
  <a href="/" target="_blank">Ver página completa</a>
  <span class="last-update" id="w-update">–</span>
</div>

<script>
const pathParts = location.pathname.split('/').filter(Boolean);
const tag = pathParts[1] || null; // /widget/:tag

if (tag) document.getElementById('widgetTitle').textContent = tag;

const fmt = ms => ms == null ? '–' : ms < 1000 ? ms + ' ms' : (ms/1000).toFixed(2) + ' s';
const fmtPct = v => v == null ? '–' : v.toFixed(1) + '%';
const timeAgo = ts => { const s = Math.round((Date.now()-ts)/1000); if(s<60)return`${s}s`;if(s<3600)return`${Math.round(s/60)}min`;return`${Math.round(s/3600)}h`; };

async function load() {
  try {
    const url = '/api/status/public' + (tag ? `?tag=${encodeURIComponent(tag)}` : '');
    const res = await fetch(url);
    const data = await res.json();
    const entries = Object.values(data.status || {});
    const down = entries.filter(s => !s.up);

    const dot = document.getElementById('w-dot');
    const overall = document.getElementById('w-overall');
    if (data.maintenanceMode) {
      dot.className = 'overall-dot maint'; overall.className = 'overall-text maint'; overall.textContent = 'Mantenimiento';
    } else if (down.length === 0) {
      dot.className = 'overall-dot ok'; overall.className = 'overall-text ok'; overall.textContent = 'Todo operativo';
    } else {
      dot.className = 'overall-dot down'; overall.className = 'overall-text down'; overall.textContent = `${down.length} caído${down.length!==1?'s':''}`;
    }

    document.getElementById('w-services').innerHTML = [...entries]
      .sort((a,b) => (!a.up&&b.up)?-1:(a.up&&!b.up)?1:a.name.localeCompare(b.name))
      .map(s => `<div class="service">
        <div class="service-left">
          <div class="s-dot ${s.up?'up':'down'}"></div>
          <div class="s-name">${s.name}</div>
        </div>
        <div class="s-right">
          <span class="s-status ${s.up?'up':'down'}">${s.up?'OK':'CAÍDO'}</span>
          <span class="s-uptime">${fmtPct(s.uptimePct)}</span>
        </div>
      </div>`).join('');

    document.getElementById('w-update').textContent = `hace ${timeAgo(data.checkedAt)}`;
  } catch {}
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
